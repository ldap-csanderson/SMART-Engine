# Application Configuration
app:
  name: "Keyword Planner API"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8000

# Google Cloud Platform Settings
gcp:
  project_id: "people-gandalf"
  region: "us-central1"
  credentials_path: "${GCP_SERVICE_ACCOUNT_KEY_PATH}"

# BigQuery Settings
bigquery:
  dataset: "keyword_planner_data"
  connection: "us-central1.vertex-ai-connection"
  tables:
    runs: "keyword_runs"
    results: "keyword_results"
    portfolio_items: "portfolio_items"
    portfolio_embeddings: "portfolio_embeddings"
    portfolio_items_v2: "portfolio_items_v2"
    portfolio_embeddings_v2: "portfolio_embeddings_v2"
    gap_analysis_results: "gap_analysis_results"
    filter_results: "filter_results"
  models:
    gemini_flash: "gemini-flash"
    text_embeddings: "text-embeddings"
  default_page_size: 100
  filter_batch_size: 500

# Google Ads Settings
google_ads:
  customer_id: "2900871247"
  config_path: "../scripts/google-ads.yaml"

# API Settings
api:
  max_retries: 3
  retry_delay_seconds: 5
