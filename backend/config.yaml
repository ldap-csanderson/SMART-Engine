# Application Configuration
app:
  name: "SMART Engine"
  version: "3.0.0"
  host: "0.0.0.0"
  port: 8000

# Google Cloud Platform Settings
gcp:
  # project_id is overridden at runtime by the GCP_PROJECT_ID env var.
  # Leave blank here; deploy.sh sets GCP_PROJECT_ID on Cloud Run.
  project_id: ""
  region: "us-central1"
  credentials_path: "${GCP_SERVICE_ACCOUNT_KEY_PATH}"

# BigQuery Settings
bigquery:
  dataset: "smart_engine_data"
  connection: "us-central1.vertex-ai-connection"
  tables:
    dataset_items: "dataset_items"
    dataset_embeddings: "dataset_embeddings"
    gap_analysis_results: "gap_analysis_results"
    filter_results: "filter_results"
  models:
    gemini_flash: "gemini-flash"
    text_embeddings: "text-embeddings"
  # Embedding dimensionality for gemini-embedding-2.
  # 768 chosen for storage/compute efficiency at scale (millions of rows).
  # See: https://ai.google.dev/gemini-api/docs/embeddings
  embedding_dimensionality: 768
  default_page_size: 100
  filter_batch_size: 500

# Google Ads Settings
google_ads:
  customer_id: ""
  config_path: "../scripts/google-ads.yaml"

# OAuth Settings (for in-app Google Ads re-authorization)
# redirect_uri and drive_redirect_uri are derived at runtime from the
# CLOUD_RUN_URL env var set by deploy.sh. These fallbacks are only used
# for local development (set them to your ngrok or local proxy URL).
oauth:
  redirect_uri: ""
  drive_redirect_uri: ""

# Google Cloud Storage — image caching bucket
gcs:
  image_bucket: "smart-engine-images"

# Secret Manager Settings
secrets:
  google_ads_secret_name: "google-ads-yaml"

# Gemini model for chat agents (overrideable via Settings UI → stored in Firestore)
gemini:
  model: "gemini-2.5-flash"

# Available models shown in the model picker
gemini_models:
  - "gemini-2.5-flash"
  - "gemini-2.5-flash-lite"
  - "gemini-2.5-pro"
  - "gemini-3-flash-preview"
  - "gemini-3.1-flash-lite-preview"
  - "gemini-3.1-pro-preview"
  - "gemini-3-deep-think"

# API Settings
api:
  max_retries: 3
  retry_delay_seconds: 5
